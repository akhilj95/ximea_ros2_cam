/ximea_nir/ximea_nir_node:
  ros__parameters:
    # -------- Image Format Configuration --------
    image_format: "XI_MONO8"

    # -------- Timing & Control Configuration --------
    img_capture_timeout_ms: 1000

    # -------- Triggering Config (0-Free Run, 2-Hardware) --------
    trigger_mode: 0
    hw_trigger_edge: 0

    # -------- Framerate Settings --------
    framerate_control: true
    framerate_set: 30

    # -------- Exposure Settings --------
    auto_exposure: true                    # Turn this ON
    exposure_time_us: 10000               # (this becomes max limit when auto_exposure is on)
    manual_gain_db: 0.0                    # (ignored when auto_exposure is on)
    auto_exposure_priority: 0.8
    auto_exposure_time_limit_us: 20000     # Max 20 ms = safe for 30 fps minimum
    auto_gain_limit_db: 6.0                # Limit gain to 6 dB to avoid noise floor

    # -------- White Balance (Optional for Mono, Inactive) --------
    wb_mode: 0

    # -------- Region of Interest Bounds (0/0/0/0 for Full Sensor) --------
    roi_left: 0
    roi_top: 0
    roi_width: 0
    roi_height: 0