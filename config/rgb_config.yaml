/ximea_rgb/ximea_rgb_node:
  ros__parameters:
    # -------- Image Format Configuration --------
    image_format: "XI_RGB24"

    # -------- Timing & Control Configuration --------
    img_capture_timeout_ms: 1000

    # -------- Triggering Config (0-Free Run, 2-Hardware) --------
    trigger_mode: 0
    hw_trigger_edge: 0

    # -------- Framerate Settings --------
    framerate_control: true
    framerate_set: 30

    # -------- Exposure Settings --------
    auto_exposure: true                    # Turn this ON
    exposure_time_us: 10000                # used only when auto_exposure: false
    manual_gain_db: 0.0                    # (ignored when auto_exposure is on)
    auto_exposure_priority: 0.8
    auto_exposure_time_limit_us: 20000     # Max 20 ms = safe for 30 fps minimum
    auto_gain_limit_db: 6.0                # Limit gain to 6 dB to avoid noise floor

    # -------- White Balance Mode (0-None, 1-Manual Coef, 2-Auto) --------
    wb_mode: 2
    # wb_kr/kg/kb only used in wb_mode: 1
    wb_kr: 3.0
    wb_kg: 1.0
    wb_kb: 4.0

    # -------- Region of Interest Bounds --------
    roi_left: 0
    roi_top: 0
    roi_width: 0
    roi_height: 0
